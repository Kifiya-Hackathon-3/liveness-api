# HTTPS on public IP with a self-signed cert (paths created by production-https.sh USE_IP=1).
# Browsers show a warning until you proceed / trust the cert.

# IPv4 only — avoids nginx bind errors on hosts with IPv6 disabled.

server {
    listen 80 default_server;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/liveness-check/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/liveness-check/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
